<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #FEFDF6; }
body { font-family: Arial, sans-serif; }

#status { padding: 16px; color: #555; font-size: 13px; }

#viewer {
  width: 100%;
  height: 520px;
  overflow: hidden;
  position: relative;
  cursor: grab;
  display: none;
}
#viewer.dragging { cursor: grabbing; }
#viewer img {
  position: absolute;
  top: 0;
  left: 0;
  transform-origin: 0 0;
  user-select: none;
  -webkit-user-drag: none;
  max-width: none;
  border-radius: 6px;
}

#controls {
  display: none;
  align-items: center;
  gap: 4px;
  padding: 5px 8px;
  background: #f0ede4;
  border-top: 1px solid #ddd9ce;
}
#controls button {
  padding: 3px 10px;
  border: 1px solid #c8c4ba;
  border-radius: 4px;
  background: #fff;
  cursor: pointer;
  font-size: 14px;
  line-height: 1.4;
}
#controls button:hover { background: #f5f2ec; }
#zoom-label {
  font-size: 12px;
  color: #666;
  min-width: 40px;
  text-align: center;
}
</style>
</head>
<body>
<p id="status">Loading…</p>
<div id="viewer"></div>
<div id="controls">
  <button id="btn-zoom-out">−</button>
  <span id="zoom-label">100%</span>
  <button id="btn-zoom-in">+</button>
  <button id="btn-fit">Fit</button>
</div>
<script type="module" src="./mcp-app.js"></script>
</body>
</html>
